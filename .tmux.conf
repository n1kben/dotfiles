# --- General settings ---
set -g mouse on                  # enable mouse support (resize/switch panes)
setw -g mode-keys vi             # use vim-style keys in copy mode
set -g history-limit 10000       # scrollback buffer size
set -g base-index 1              # panes start counting at 1
setw -g pane-base-index 1

# --- Appearance ---
set -g status off

# --- Shortcuts ---
bind-key -n M-J split-window -v
bind-key -n M-K split-window -b -v
bind-key -n M-L split-window -h
bind-key -n M-H split-window -b -h
bind-key -n M-r source-file ~/.tmux.conf \; display-message "Config reloaded!"
bind-key -n M-p popup -E 'bash -c '\''current=$(tmux display-message -p "#S"); tmux list-sessions -F "#{session_name} #{session_last_attached}" | sort -k2 -nr | awk "{print \$1}" | grep -v "^$current\$" | fzf | xargs -r tmux switch-client -t'\'''
bind-key -n M-P command-prompt -p "Name:" "new-session -A -s '%%'"
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-h select-pane -L
bind-key -n M-l select-pane -R
bind-key -n C-j select-pane -D
bind-key -n C-k select-pane -U
bind-key -n C-h select-pane -L
bind-key -n C-l select-pane -R
bind-key -n M-z detach
bind-key -n M-w kill-pane
bind-key -n M-Enter resize-pane -Z
bind-key -n M-t new-window
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9
unbind '"'
unbind %

# --- Terminal protocol ---
set -g extended-keys on
set -g extended-keys-format csi-u
