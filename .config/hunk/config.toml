theme = "auto"
mode = "auto"        # auto, split, stack
vcs = "git"          # git, jj, sl
watch = false       # MUST stay false: as a git pager, hunk reads stdin (not reloadable); watch=true makes `git diff` error
exclude_untracked = false
line_numbers = true
wrap_lines = false
agent_notes = false
transparent_background = false
